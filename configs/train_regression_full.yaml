experiment_name: villegas_rgb_electrical
metadata_csv: data/processed/unified_metadata/metadata_master.csv
dataset_name: villegas
backbone: resnet18
pretrained: true
image_size: 224
batch_size: 32
epochs: 6
num_workers: 0
