experiment_name: villegas_rgb_electrical_image_only
metadata_csv: data/processed/unified_metadata/metadata_master.csv
dataset_name: villegas
backbone: resnet18
pretrained: true
image_size: 224
batch_size: 8
epochs: 2
num_workers: 0
learning_rate: 0.0003
weight_decay: 0.0001
optimizer: adamw
targets:
  - pmpp
  - isc
  - ff
use_weather_features: false
weather_features:
  - irradiance
  - temperature
  - azimuth
  - zenith
  - albedo
max_train_samples: 2048
max_val_samples: 512
max_test_samples: 512
random_seed: 42
output_dir: outputs/models/villegas_image_only
save_name: best_electrical_image_only.pt
